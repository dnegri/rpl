# RESEARCH — cards are auto-numbered. Set "columns: N" to fix the grid (1–4); omit for auto.
kicker: Research areas
heading: Five directions, one computational core.
# columns: 3
cards:
  - title: Monte Carlo Neutron Transport
    body: In-house GPU-accelerated Monte Carlo code (MONTEX), CUDA-based continuous-energy transport, and multigroup cross-section generation.
  - title: Whole-Core Transport & Diffusion
    body: Two-step Monte Carlo → pin-by-pin diffusion method (MONTEX/SPHINCS) and MOC-based 2D/1D whole-core transport (CROMA).
  - title: SMR Core Design
    body: Innovative Small Modular Reactor core concepts, soluble-boron-free reactivity control, and APR1400 core design for next-generation systems.
  - title: Computational Methods
    body: Method of Characteristics (MOC), Coarse-Mesh Finite-Difference (CMFD) acceleration, and depletion methods including predictor-corrector and CRAM.
  - title: AI & HPC for Nuclear
    body: GPU/CUDA acceleration, MPI/OpenMP parallel frameworks, and machine-learning applications in reactor-physics simulation and optimization.

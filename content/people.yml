kicker: People
heading: An international team at the academia–industry interface.

# The Principal Investigator is shown as a large feature row at the top.
pi:
  name: Prof. Joo-il Yoon
  role: Principal Investigator · Associate Professor
  affiliation: Head, Department of Nuclear Power Plant Engineering, KINGS
  photo: yoon-feature.jpg
  email: jiyoon@kings.ac.kr
  bio: >
    As Principal Investigator, Prof. Yoon directs RPL's research across Monte Carlo
    neutron transport, high-fidelity deterministic core solvers, and AI-enhanced reactor
    simulation. His work carries computational reactor physics from first-principles
    methods through to industrial PWR and next-generation SMR core design, and underpins
    the lab's two-step pin-by-pin code system.


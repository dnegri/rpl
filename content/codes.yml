# CODES — the code system.
#  • pipeline: the flow diagram boxes (kind: mid / out change the accent; omit for plain).
#  • groups:   each group is a labelled row of code cards.
#      status:  MATURE / ACTIVE / IN DEVELOPMENT  (sets the badge colour)
#      tags:    a short list shown as chips
#      columns: optional, fixes that group's grid (1–4)
kicker: The code system
heading: A two-step PWR pipeline, plus solvers for new geometries.
intro: >
  Lattice transport and Monte Carlo generate cross sections; HYBRID processes them
  into tablesets; SPHINCS runs the pin-by-pin whole core. Alongside the PWR chain, we build
  solvers for hexagonal and cylindrical Gen-IV geometries. Every code shares one foundation —
  the JIArray numerical library.

pipeline:
  - label: MONTEX · CROMA
    sub: lattice transport / XS generation
  - label: HYBRID
    sub: SPH · homogenization · functionalization
    kind: mid
  - label: SPHINCS
    sub: pin-by-pin 3-D whole core
    kind: out
pipeline_note: "data flow `.hybrid` → `.hbd` → whole-core results (k-eff · pin power · depletion · transient)"

figure:
  src: two-step.png
  pad: true
  caption: The two-step method — pin-wise cross-section generation feeds a whole-core pin-by-pin 3-D calculation.

groups:
  - label: PWR two-step system
    codes:
      - name: SPHINCS
        status: MATURE
        exp: SPH-based Pin-Homogenized Innovative Neutronics Core Simulator
        desc: 3-D pin-by-pin diffusion core simulator — steady-state, depletion, reactivity coefficients, and time-dependent transient with one kernel.
        tags: [2D/1D, two-level CMFD, SPH · SP3]
      - name: MONTEX
        status: ACTIVE
        exp: Monte Carlo code for Neutronic X
        desc: GPU continuous-energy Monte Carlo transport, generating transport-corrected multigroup cross sections for the two-step pipeline.
        tags: [GPU / CUDA, CRAM depletion, MPI]
      - name: CROMA
        status: ACTIVE
        exp: Characteristics-based Reactor Operation & Multigroup Analysis
        desc: A newly developed 2-D Method-of-Characteristics lattice transport solver in C++, sharing the DeCART library, with cell-based CMFD acceleration.
        tags: [MOC, CMFD, depletion · branch]
      - name: HYBRID
        status: ACTIVE
        exp: Cross-section processing pipeline
        desc: Converts lattice and Monte Carlo results into SPHINCS-ready tablesets — isotopic lumping, SPH equivalence, discontinuity factors, and branch functionalization.
        tags: [SPH, discontinuity factors, .hbd]
  - label: Gen-IV & other geometries
    codes:
      - name: VENUS
        status: ACTIVE
        exp: SFR hexagonal-core solver
        desc: Variational nodal method for sodium-cooled fast reactor cores — 2-D/3-D hex-z, multigroup diffusion and Pₙ transport, verified against Takeda-4, SNR-300 and VVER-440.
        tags: [variational nodal, Pₙ transport, CMFD]
      - name: HEXANUS
        status: IN DEVELOPMENT
        exp: Hexagonal nodal diffusion
        desc: Multigroup nodal diffusion solver for hexagonal-assembly cores using the TPEN / Corner-Point-Balance method with CMFD acceleration.
        tags: [TPEN · CPB, CMFD, hex-z]
      - name: CYNUS
        status: IN DEVELOPMENT
        exp: Cylindrical-geometry diffusion solver
        desc: "Fine-mesh FDM + CMFD eigenvalue solver in cylindrical (r,θ,z) geometry, targeting molten-salt reactor core analysis."
        tags: [FDM, CMFD, MSR]

foundation: "Foundation — all codes are built on **JIArray**, an in-house header-only N-dimensional array library (1-based, column-major, CUDA-capable)."
